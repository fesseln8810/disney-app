<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Tokyo Disney Resort Show Schedule</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
  font-family: -apple-system;
  padding: 16px;
  background: #f5f5f5;
}

.card {
  border-radius: 12px;
  padding: 12px;
  margin: 10px 0;
  background: #fff;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}
</style>
</head>

<body>

<h1>ディズニーショースケジュール</h1>

<label>パーク</label><br>
<select id="park">
  <option value="tdl">ディズニーランド</option>
  <option value="tds">ディズニーシー</option>
</select>

<br><br>

<label>日付</label><br>
<input type="date" id="date">

<br><br>

<button type="button" onclick="fetchData()">取得する</button>

<hr>

<div id="result"></div>

<script>
async function fetchData() {
  const park = document.getElementById("park").value;
  const date = document.getElementById("date").value.replaceAll("-", "");

  const resultDiv = document.getElementById("result");
  resultDiv.innerHTML = "取得中...";

  try {
    const url = `https://corsproxy.io/?https://www.tokyodisneyresort.jp/${park}/daily/calendar/${date}/`;

    const res = await fetch(url);
    if (!res.ok) throw new Error("通信失敗");

    const html = await res.text();
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, "text/html");

    resultDiv.innerHTML = "";

    const blocks = doc.querySelectorAll("li, div");

    let count = 0;

    blocks.forEach(block => {
const cards = doc.querySelectorAll("section, li, div");

let seen = new Set();

cards.forEach(card => {
  const text = card.innerText.trim();

  // 開園時間は除外
  if (text.includes("開園時間")) return;

  // 時間取得
  const times = text.match(/\d{1,2}:\d{2}/g);
  if (!times) return;

  // ショー名候補（上の方のテキスト）
  const lines = text.split("\n").map(l => l.trim()).filter(l => l !== "");

  let name = null;

  for (let line of lines) {
    if (!line.match(/\d{1,2}:\d{2}/) && line.length > 5) {
      name = line;
      break;
    }
  }

  if (!name) return;

  // 重複防止（これ重要）
  if (seen.has(name)) return;
  seen.add(name);

  const timeText = [...new Set(times)].join(" / ");

  const div = document.createElement("div");
  div.className = "card";

  div.innerHTML = `
    <div style="font-weight:bold; font-size:16px;">${name}</div>
    <div style="margin-top:4px;">🕒 ${timeText}</div>
  `;

  resultDiv.appendChild(div);
});
    
    if (count === 0) {
      resultDiv.innerHTML = "スケジュールが見つかりません（未公開 or 構造変更）";
    }

  } catch (err) {
    console.error(err);
    resultDiv.innerHTML = "取得に失敗しました（通信エラー）";
  }
}
</script>

</body>
</html>
