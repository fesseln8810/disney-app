<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Tokyo Disney Resort Show Schedule</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<h1>ディズニーショースケジュール</h1>

<select id="park">
  <option value="tdl">ディズニーランド</option>
  <option value="tds">ディズニーシー</option>
</select>

<br><br>

<input type="date" id="date">

<br><br>

<button onclick="fetchData()">取得する</button>

<hr>

<div id="result"></div>

<script>
async function fetchData() {
  const park = document.getElementById("park").value;
  const date = document.getElementById("date").value.replaceAll("-", "");

  const url = `https://api.allorigins.win/raw?url=https://www.tokyodisneyresort.jp/${park}/daily/calendar/${date}/`;

  const res = await fetch(url);
  const html = await res.text();

  const parser = new DOMParser();
  const doc = parser.parseFromString(html, "text/html");

  const resultDiv = document.getElementById("result");
  resultDiv.innerHTML = "";

  const items = doc.querySelectorAll("li");

  items.forEach(item => {
    const name = item.querySelector(".heading")?.textContent;
    const time = item.querySelector(".time")?.textContent;

    if (name) {
      const div = document.createElement("div");
      div.innerHTML = `<b>${name}</b><br>${time || "未定"}<hr>`;
      resultDiv.appendChild(div);
    }
  });
}
</script>

</body>
</html>
