<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Tokyo Disney Resort Show Schedule</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { font-family: -apple-system; padding: 16px; }
.card {
  border: 1px solid #ddd;
  border-radius: 10px;
  padding: 10px;
  margin: 8px 0;
}
body {
  background: #f5f5f5;
}

.card {
  border-radius: 12px;
  padding: 12px;
  margin: 10px 0;
  background: #fff;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}
</style>
</head>

<body>

<h1>ディズニーショースケジュール</h1>

<label>パーク</label><br>
<select id="park">
  <option value="tdl">ディズニーランド</option>
  <option value="tds">ディズニーシー</option>
</select>

<br><br>

<label>日付</label><br>
<input type="date" id="date">

<br><br>

<button onclick="fetchData()">取得する</button>

<hr>

<div id="result"></div>

<script>
async function fetchData() {
  const park = document.getElementById("park").value;
  const date = document.getElementById("date").value.replaceAll("-", "");

  const resultDiv = document.getElementById("result");
  resultDiv.innerHTML = "取得中...";

  try {
    const url = `https://corsproxy.io/?https://www.tokyodisneyresort.jp/${park}/daily/calendar/${date}/`;

    const res = await fetch(url);

    if (!res.ok) {
      throw new Error("通信失敗");
    }

    const html = await res.text();
    resultDiv.innerHTML = html;
    return;
    console.log("HTML取得成功");

    const parser = new DOMParser();
    const doc = parser.parseFromString(html, "text/html");

    resultDiv.innerHTML = "";

    const items = doc.querySelectorAll("li");

    if (items.length === 0) {
      resultDiv.innerHTML = "データが取得できません（構造変更 or 未公開）";
      return;
    }

resultDiv.innerHTML = "";

const blocks = doc.querySelectorAll("li, div");

blocks.forEach(block => {
  const text = block.innerText.trim();

  const times = text.match(/\d{1,2}:\d{2}/g);

  if (times && text.length < 200) {

    const lines = text.split("\n").filter(l => l.trim() !== "");
    const name = lines[0];
    const timeText = times.join(" / ");

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div style="font-weight:bold; font-size:16px;">${name}</div>
      <div style="margin-top:4px;">🕒 ${timeText}</div>
    `;

    resultDiv.appendChild(div);
  }
});


  } catch (err) {
    console.error(err);
    resultDiv.innerHTML = "取得に失敗しました（通信エラー）";
  }
}
</script>

</body>
</html>
